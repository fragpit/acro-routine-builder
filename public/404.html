<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Acro Routine Builder</title>
    <script>
      (function () {
        var BASE = '/acro-routine-builder/';
        var loc = window.location;
        if (loc.pathname.indexOf(BASE) === 0) {
          var sub = loc.pathname.slice(BASE.length).replace(/\/+$/, '');
          var hash = sub ? '#/' + sub : '';
          loc.replace(BASE + loc.search + hash);
        } else {
          loc.replace(BASE);
        }
      })();
    </script>
  </head>
  <body></body>
</html>
